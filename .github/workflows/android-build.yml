name: Android Build & Release AAB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Setup Node
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3) Install dependencies (FIXED)
      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      # 4) Build web app
      - name: Build Web Assets
        run: npm run build

      # 5) Setup Java (important for Android Gradle)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 6) Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7) Ensure Android platform exists
      - name: Add Capacitor Android (safe)
        run: npx cap add android || echo "Android already exists"

      # 8) Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 9) Build AAB
      - name: Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --stacktrace

      # 10) Upload artifact
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
